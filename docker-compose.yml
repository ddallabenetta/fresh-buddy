services:
  stt:
    build:
      context: services/stt
      args:
        WHISPER_MODEL: ${WHISPER_MODEL:-tiny}
    image: fresh-buddy/stt:latest
    container_name: fresh-buddy-stt
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-tiny}
      - STT_LANGUAGE=${STT_LANGUAGE:-it}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-1}
      - WHISPER_BEST_OF=${WHISPER_BEST_OF:-1}
      - WHISPER_TEMPERATURE=${WHISPER_TEMPERATURE:-0.0}
      - WHISPER_VAD_FILTER=${WHISPER_VAD_FILTER:-true}
      - WHISPER_CONDITION_ON_PREVIOUS_TEXT=${WHISPER_CONDITION_ON_PREVIOUS_TEXT:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - whisper-models:/root/.cache/huggingface
    restart: unless-stopped

  tts:
    build:
      context: services/tts
    image: fresh-buddy/tts:latest
    container_name: fresh-buddy-tts
    environment:
      - PIPER_VOICE=${PIPER_VOICE:-it_IT-riccardo-x_low}
      - TTS_VOLUME=${TTS_VOLUME:-0.3}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - piper-voices:/app/voices
    restart: unless-stopped

  # Fresh Buddy - Voice AI Companion
  fresh-buddy:
    build:
      context: .
      dockerfile: Dockerfile.client
    image: fresh-buddy/app:latest
    container_name: fresh-buddy
    env_file:
      - .env
    depends_on:
      - stt
      - tts
    ports:
      - "${PREVIEW_PORT:-8088}:8088"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./meetings:/app/meetings
      - /dev/dri:/dev/dri
      - /dev/snd:/dev/snd
    devices:
      - /dev/fb0:/dev/fb0
    device_cgroup_rules:
      - "c 29:* rmw"
      - "c 116:* rmw"
      - "c 226:* rmw"
    group_add:
      - "29"
      - "44"
      - "104"
    tty: true
    stdin_open: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_API_ENDPOINT=${LLM_API_ENDPOINT:-http://host.docker.internal:8101/v1}
      - LLM_API_KEY=${LLM_API_KEY:-not-needed}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-gemma-4-E2B-it-UD-Q4_K_XL.gguf}
      - STT_ENDPOINT=http://stt:5001
      - TTS_ENDPOINT=http://tts:5002
      - STT_CHUNK_FRAMES=${STT_CHUNK_FRAMES:-512}
      - STT_BEAM_SIZE=${STT_BEAM_SIZE:-1}
      - STT_BEST_OF=${STT_BEST_OF:-1}
      - STT_TEMPERATURE=${STT_TEMPERATURE:-0.0}
      - STT_VAD_FILTER=${STT_VAD_FILTER:-true}
      - STT_CONDITION_ON_PREVIOUS_TEXT=${STT_CONDITION_ON_PREVIOUS_TEXT:-false}
      - PIPER_VOICE=${PIPER_VOICE:-it_IT-paola-medium}
      - TTS_VOLUME=${TTS_VOLUME:-0.3}
      - AUDIO_INPUT_DEVICE=${AUDIO_INPUT_DEVICE:-ReSpeaker}
      - AUDIO_OUTPUT_DEVICE=${AUDIO_OUTPUT_DEVICE:-ReSpeaker}
      - DEBUG_MODE=${DEBUG_MODE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PREVIEW_PORT=${PREVIEW_PORT:-8088}
    restart: unless-stopped

  # Optional local LLM service; disabled unless profile `local-llm` is enabled.
  llm-server:
    profiles: ["local-llm"]
    build:
      context: ./server
      dockerfile: Dockerfile
    image: fresh-buddy/llm-server:latest
    container_name: fresh-buddy-llm
    ports:
      - "${LLM_PORT:-8080}:8080"
    volumes:
      - ${MODEL_PATH:-./models}:/models:ro
    environment:
      - MODEL_NAME=${MODEL_NAME:-model}
      - CONTEXT_SIZE=${CONTEXT_SIZE:-4096}
      - N_GPU_LAYERS=${N_GPU_LAYERS:-32}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  whisper-models:
  piper-voices:

